version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: always
    env_file: .env.production
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
