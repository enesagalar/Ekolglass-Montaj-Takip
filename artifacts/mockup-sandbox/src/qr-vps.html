<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>VPS QR Kodu</title>
<style>
body { font-family: Arial, sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); text-align: center; max-width: 340px; }
h2 { margin: 0 0 6px; font-size: 20px; color: #1e293b; }
p { margin: 0 0 20px; color: #64748b; font-size: 14px; }
.url { background: #f1f5f9; border-radius: 10px; padding: 10px 16px; font-family: monospace; font-size: 15px; color: #0a84ff; margin-bottom: 20px; word-break: break-all; }
img { border-radius: 12px; border: 3px solid #e2e8f0; }
.note { margin-top: 16px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <h2>📱 Expo Go ile Bağlan</h2>
  <p>Expo Go uygulamasında bu QR kodu tarayın</p>
  <div class="url">exp://46.225.233.65:8081</div>
  <img src="https://api.qrserver.com/v1/create-qr-code/?data=exp%3A%2F%2F46.225.233.65%3A8081&size=220x220&margin=10" width="220" height="220" alt="QR Kod"/>
  <div class="note">VPS IP: 46.225.233.65 · Port: 8081</div>
</div>
</body>
</html>
